name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.actor == github.repository_owner && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release context
        shell: pwsh
        run: |
          git fetch --force origin main --tags
          $remoteHead = git rev-parse origin/main
          $currentSha = "${{ github.sha }}"

          if ($remoteHead -ne $currentSha) {
            throw "Refusing to publish from stale commit $currentSha. Current main head is $remoteHead."
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine release version
        id: version
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $currentVersion = $package.version
          $existingTag = git tag --points-at HEAD --list "v*" | Select-Object -First 1
          $latestTag = git tag --list "v*" --sort=-version:refname | Select-Object -First 1

          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            $nextVersion = $existingTag.TrimStart('v')
            $tag = $existingTag
            $needsBump = 'false'
          } elseif ([string]::IsNullOrWhiteSpace($latestTag)) {
            $nextVersion = $currentVersion
            $tag = "v$nextVersion"
            $needsBump = if ($currentVersion -ne $nextVersion) { 'true' } else { 'false' }
          } else {
            $parts = $latestTag.TrimStart('v').Split('.')
            if ($parts.Length -ne 3) {
              throw "Unsupported tag format: $latestTag"
            }

            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2] + 1
            $nextVersion = "$major.$minor.$patch"
            $tag = "v$nextVersion"
            $needsBump = if ($currentVersion -ne $nextVersion) { 'true' } else { 'false' }
          }

          "current=$currentVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$nextVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "needs_bump=$needsBump" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Bump package version
        if: steps.version.outputs.needs_bump == 'true'
        shell: pwsh
        run: npm version --no-git-tag-version ${{ steps.version.outputs.version }}

      - name: Typecheck
        run: npm run typecheck

      - name: Run test suite
        run: npm test

      - name: Build application
        run: npm run build

      - name: Package Windows installer
        run: npm run make

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "out/make/squirrel.windows/x64" -Filter "*Setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Setup.exe installer not found in out/make/squirrel.windows/x64"
          }

          "path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Commit version bump
        if: steps.version.outputs.needs_bump == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if (git diff --cached --quiet) {
            Write-Host "Version files already match ${{ steps.version.outputs.tag }}."
          } else {
            git commit -m "chore(release): ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin HEAD:main
          }

      - name: Create and push tag
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"

          if (-not [string]::IsNullOrWhiteSpace($remoteTag)) {
            git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
            $tagCommit = git rev-list -n 1 $tag
            $headCommit = git rev-parse HEAD

            if ($tagCommit -ne $headCommit) {
              throw "Tag $tag already exists on $tagCommit, not on current HEAD $headCommit."
            }

            Write-Host "Tag $tag already points to the current commit."
          } else {
            git tag $tag
            git push origin $tag
          }

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $asset = "${{ steps.installer.outputs.path }}"

          gh release view $tag --json url *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title $tag --generate-notes
          }
